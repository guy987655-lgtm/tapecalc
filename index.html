<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Tape Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #121212;
    --surface:      #1c1c1f;
    --surface-2:    #27272a;
    --surface-3:    #32323a;
    --surface-hover:#3a3a42;
    --text:         #f4f4f5;
    --text-muted:   #b8b8c0;
    --text-dim:     #8a8a93;
    --accent:       #00E676;
    --accent-soft:  rgba(0, 230, 118, 0.12);
    --operator:     #ffb454;
    --danger:       #ff5e7e;
    --op-add:       #00E676;
    --op-mul:       #00A050;
    --op-sub:       #FF5E7E;
    --op-div:       #FFA3B1;
    --divider:      rgba(255,255,255,0.05);
    --shadow: 0 20px 60px rgba(0,0,0,0.55), 0 2px 8px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: 'cv11', 'ss01', 'tnum';
    overflow: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(0,230,118,0.06), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(0,140,255,0.05), transparent 60%),
      var(--bg);
  }

  .app {
    width: 100%;
    max-width: 980px;
    height: min(640px, calc(100vh - 48px));
    background: var(--surface-2);
    border-radius: 20px;
    box-shadow: var(--shadow);
    display: grid;
    grid-template-columns: 1fr 380px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.04);
  }

  /* -------------------- TAPE -------------------- */
  .tape {
    display: flex;
    flex-direction: column;
    background: var(--surface);
    min-width: 0;
  }

  .tape-header {
    padding: 22px 28px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--divider);
  }

  .tape-title {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .tape-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
    opacity: 0.85;
  }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  /* ---- Calc panel handle (bottom-sheet style toggle) ---- */
  .calc-handle {
    display: none; /* only on mobile */
    flex-shrink: 0;
    justify-content: center;
    align-items: center;
    height: 22px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .calc-handle span {
    display: block;
    width: 32px;
    height: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,0.18);
    transition: background 0.15s;
  }
  .calc-handle:active span { background: rgba(255,255,255,0.35); }

  .tape-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 28px 24px;
    scroll-behavior: smooth;
  }

  .tape-body::-webkit-scrollbar { width: 6px; }
  .tape-body::-webkit-scrollbar-track { background: transparent; }
  .tape-body::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
  }
  .tape-body::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); }

  .tape-empty {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 14px;
    text-align: center;
    letter-spacing: 0.02em;
  }

  .tape-row {
    position: relative;
    display: flex;
    flex-direction: row;
    align-items: baseline;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px dashed var(--divider);
    animation: slideIn 0.28s ease-out;
    transition: opacity 0.18s ease, max-height 0.22s ease, padding 0.18s ease;
  }
  .tape-row:last-child { border-bottom: none; }
  .tape-row.pending { border-bottom: none; animation: none; }
  .tape-row.removing {
    opacity: 0; max-height: 0;
    padding-top: 0; padding-bottom: 0; overflow: hidden;
  }

  /* ערך השורה — the operand number, big on the left */
  .tape-operand {
    flex: 0 0 auto;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    color: var(--text-muted);
    display: flex;
    align-items: baseline;
    gap: 3px;
  }
  .tape-operand.op-add { color: var(--op-add); }
  .tape-operand.op-sub { color: var(--op-sub); }
  .tape-operand.op-mul { color: var(--op-mul); }
  .tape-operand.op-div { color: var(--op-div); }
  /* operator sign — smaller, slightly dimmed */
  .tape-sign {
    font-size: 13px;
    font-weight: 500;
    opacity: 0.75;
    flex-shrink: 0;
  }
  .tape-operand.negative { color: var(--op-sub); }
  .tape-operand.error { color: var(--danger); font-size: 13px; }

  /* Running total on the left of the dashed divider line */
  .tape-row[data-running]::after {
    content: attr(data-running);
    position: absolute;
    left: 0;
    bottom: -9px;
    height: 17px;
    line-height: 17px;
    background: var(--surface);
    padding-right: 8px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    letter-spacing: 0.02em;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    z-index: 1;
    pointer-events: none;
  }
  .tape-row[data-running-neg]::after { color: var(--op-sub); }
  .tape-row.pending::after,
  .tape-row:last-child::after { display: none; }

  .tape-delete {
    flex: 0 0 auto;
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    width: 22px;
    height: 22px;
    padding: 0;
    border-radius: 50%;
    font-size: 16px;
    font-weight: 400;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s ease, background 0.15s ease, color 0.15s ease;
    -webkit-tap-highlight-color: transparent;
    align-self: center;
  }
  .tape-row:hover .tape-delete { opacity: 0.4; }
  .tape-delete:hover { opacity: 1; color: var(--danger); background: rgba(255,94,126,0.1); }
  .tape-delete:focus { opacity: 1; outline: none; }
  .tape-row.pending .tape-delete { visibility: hidden; pointer-events: none; }
  @media (hover: none) {
    .tape-row:not(.pending) .tape-delete { opacity: 0.35; }
  }

  .tape-note {
    flex: 1;
    min-width: 0;
    text-align: right;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    opacity: 0.9;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    line-height: 1.4;
    outline: none;
    cursor: text;
    border-radius: 4px;
    padding: 2px 6px;
    word-break: break-word;
    align-self: center;
    transition: background 0.15s ease, opacity 0.15s ease, color 0.15s ease;
  }
  .tape-note:empty {
    opacity: 0;
    color: var(--text-dim);
  }
  .tape-note:empty::before {
    content: '+';
    pointer-events: none;
  }
  .tape-row:hover .tape-note:empty,
  .tape-note:focus:empty {
    opacity: 0.45;
  }
  .tape-note:focus {
    background: rgba(255,255,255,0.06);
    color: var(--text);
    opacity: 1;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* -------------------- CALCULATOR -------------------- */
  .calc {
    display: flex;
    flex-direction: column;
    background: var(--surface-2);
    padding: 24px;
  }

  .display {
    background: transparent;
    text-align: right;
    margin-bottom: 18px;
    min-height: 96px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    overflow: hidden;
  }

  .display-pending {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 6px;
    min-height: 18px;
    letter-spacing: 0.02em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    direction: rtl;
  }

  .display-current {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 48px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1.1;
    font-variant-numeric: tabular-nums;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .display-current.error { color: var(--danger); }

  .keypad {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    flex: 1;
  }

  button.key {
    border: none;
    outline: none;
    cursor: pointer;
    background: var(--surface-3);
    color: var(--text);
    font-family: inherit;
    font-size: 20px;
    font-weight: 500;
    border-radius: 12px;
    padding: 0;
    min-height: 56px;
    transition: background 0.12s ease, transform 0.06s ease;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  button.key:hover { background: var(--surface-hover); }
  button.key:active { transform: scale(0.97); background: var(--surface-hover); }

  button.key.op {
    color: var(--operator);
    font-weight: 600;
  }
  button.key.op.active {
    background: var(--operator);
    color: #1a1a1a;
  }

  button.key.eq {
    background: var(--accent);
    color: #0a1a10;
    font-weight: 700;
  }
  button.key.eq:hover { background: #1aeb84; }

  button.key.util {
    color: var(--text-muted);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  button.key.util.ac { color: var(--danger); }

  button.key.eq { grid-column: span 2; }

  button.key.disabled {
    color: var(--text-dim);
    opacity: 0.35;
    cursor: not-allowed;
  }
  button.key.disabled:hover,
  button.key.disabled:active {
    background: var(--surface-3);
    transform: none;
  }

  /* -------------------- MODAL -------------------- */
  dialog.modal {
    background: var(--surface-2);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    color: var(--text);
    padding: 0;
    max-width: 320px;
    width: calc(100vw - 48px);
    box-shadow: 0 30px 60px rgba(0,0,0,0.55), 0 4px 12px rgba(0,0,0,0.4);
    font-family: 'Inter', system-ui, sans-serif;
  }
  dialog.modal::backdrop {
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .modal-content {
    padding: 22px 22px 18px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .modal-text {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
  }
  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  .modal-btn {
    background: var(--surface-3);
    color: var(--text);
    border: none;
    padding: 9px 16px;
    border-radius: 9px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .modal-btn:hover { background: var(--surface-hover); }
  .modal-btn.danger { background: var(--danger); color: #1a1a1a; }
  .modal-btn.danger:hover { background: #ff7591; }

  /* -------------------- RESPONSIVE — PORTRAIT MOBILE -------------------- */
  @media (max-width: 720px) and (orientation: portrait) {
    body {
      padding: 0;
      align-items: stretch;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .app {
      grid-template-columns: 1fr;
      /* minmax(0,1fr) lets the tape shrink when rows grow — fixes "pushes bottom" bug */
      grid-template-rows: minmax(0, 1fr) auto;
      height: 100vh;
      height: 100dvh;
      max-width: none;
      border-radius: 0;
    }
    /* must be 0 so the grid can actually shrink the tape */
    .tape { min-height: 0; }
    .tape-header { padding: 14px 20px 10px; }
    .tape-body   { min-height: 0; padding: 10px 20px 14px; }
    .calc { padding: 10px 16px 14px; }
    .keypad { gap: 8px; }
    button.key { min-height: 44px; font-size: 16px; }
    button.key.util { font-size: 13px; }
    /* handle at top of calc, collapses panel down */
    .calc-handle { display: flex; margin: -10px -16px 4px; }
    .app.calc-collapsed { grid-template-rows: 1fr 22px; }
    .app.calc-collapsed .keypad { display: none; }
    .app.calc-collapsed .calc { padding: 0 16px; }
  }

  /* -------------------- RESPONSIVE — LANDSCAPE MOBILE -------------------- */
  /* Calculator = 25 % right column, tape = 75 % left column */
  @media (max-height: 500px) and (orientation: landscape) {
    body {
      padding: 0;
      align-items: stretch;
      padding-right: env(safe-area-inset-right);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .app {
      grid-template-columns: 3fr 1fr;   /* tape 75 %, calc 25 % */
      grid-template-rows: 1fr;
      height: 100vh;
      height: 100dvh;
      max-width: none;
      border-radius: 0;
    }
    .tape { min-height: 0; }
    .tape-header { padding: 10px 16px 8px; }
    .tape-body   { min-height: 0; padding: 8px 16px 10px; }
    /* calc section fills its column height exactly */
    .calc {
      padding: 6px 8px;
      overflow: hidden;
      height: 100%;
      box-sizing: border-box;
    }
    /* shrink the display readout so the keypad gets the rest */
    .display { min-height: 0; flex-shrink: 0; margin-bottom: 4px; }
    .display-current { font-size: 26px; line-height: 1.2; }
    .display-pending { font-size: 11px; min-height: 12px; margin-bottom: 2px; }
    /* keypad fills remaining height; align-content:stretch distributes rows evenly */
    .keypad { flex: 1; min-height: 0; gap: 4px; align-content: stretch; }
    button.key { min-height: 0; height: auto; font-size: 13px; }
    button.key.util { font-size: 11px; }
    /* handle at top of calc column, collapses calc rightward */
    .calc-handle { display: flex; margin: -6px -8px 2px; }
    .app.calc-collapsed { grid-template-columns: 1fr 22px; }
    .app.calc-collapsed .keypad { display: none; }
    .app.calc-collapsed .calc { padding: 0; }
  }

  @media (max-height: 560px) and (min-width: 721px) {
    .app { height: calc(100vh - 24px); }
  }
</style>
</head>
<body>
  <div class="app" role="application" aria-label="Tape Calculator">
    <section class="tape" aria-label="Calculation history">
      <header class="tape-header">
        <span class="tape-title">Tape</span>
        <div class="header-controls">
          <span class="tape-dot" aria-hidden="true"></span>
        </div>
      </header>
      <div class="tape-body" id="tape">
        <div class="tape-empty" id="tapeEmpty">No calculations yet. Start typing.</div>
      </div>
    </section>

    <dialog id="confirmDialog" class="modal" aria-labelledby="confirmText">
      <form method="dialog" class="modal-content">
        <div class="modal-text" id="confirmText">Delete this row?</div>
        <div class="modal-actions">
          <button type="button" class="modal-btn" id="confirmCancel">Cancel</button>
          <button type="submit" class="modal-btn danger" id="confirmOK" value="confirm">Delete</button>
        </div>
      </form>
    </dialog>

    <section class="calc" aria-label="Calculator">
      <div class="calc-handle" id="calcHandle"><span></span></div>
      <div class="keypad">
        <button class="key util ac" data-action="all-clear">AC</button>
        <button class="key util"    data-action="clear">C</button>
        <button class="key util"    data-action="backspace">⌫</button>
        <button class="key op"      data-op="/">÷</button>

        <button class="key" data-digit="7">7</button>
        <button class="key" data-digit="8">8</button>
        <button class="key" data-digit="9">9</button>
        <button class="key op" data-op="*">×</button>

        <button class="key" data-digit="4">4</button>
        <button class="key" data-digit="5">5</button>
        <button class="key" data-digit="6">6</button>
        <button class="key op" data-op="-">−</button>

        <button class="key" data-digit="1">1</button>
        <button class="key" data-digit="2">2</button>
        <button class="key" data-digit="3">3</button>
        <button class="key op" data-op="+">+</button>

        <button class="key" data-digit="0">0</button>
        <button class="key" data-action="double-zero">00</button>
        <button class="key eq" data-action="equals">=</button>
      </div>
    </section>
  </div>

<script>
(() => {
  // ---------- State ----------
  // Tape calc model: an array of committed tokens (numbers + operators)
  // plus the current number being typed. The "pending" row in the tape
  // mirrors this state live. On '=' we evaluate, finalize that row, and
  // spawn a fresh pending row.
  const state = {
    tokens: [],      // committed sequence: ['150','+','20','+', ...]
    typing: null,    // current number being typed, or null when waiting
    error: false,
    lastResult: null // last evaluated result, enables chaining after '='
  };

  // ---------- DOM ----------
  const $tape = document.getElementById('tape');
  const $confirmDialog = document.getElementById('confirmDialog');
  const $confirmCancel = document.getElementById('confirmCancel');
  let pendingRow = null;
  let rowAwaitingDelete = null;

  // ---------- Helpers ----------
  const OP_SYMBOL = { '+': '+', '-': '−', '*': '×', '/': '÷' };
  const OP_NAME   = { '+': 'add', '-': 'sub', '*': 'mul', '/': 'div' };
  const isOp = (t) => t === '+' || t === '-' || t === '*' || t === '/';

  // Format an in-progress typed string with thousands grouping while preserving
  // a trailing dot or fractional part the user is still typing.
  // Format a number being typed — integers only, with thousands grouping.
  const formatLive = (s) => {
    if (s == null || s === '') return '';
    if (s === '-') return '-';
    const neg = s.startsWith('-');
    const body = neg ? s.slice(1) : s;
    const intPart = body.split('.')[0] || '0';
    const out = Number(intPart).toLocaleString('en-US');
    return neg ? '-' + out : out;
  };

  // Format a finalized number — always rounded to whole integer.
  const formatNumber = (n) => {
    if (!isFinite(n)) return 'Error';
    return Math.round(n).toLocaleString('en-US');
  };

  const calculate = (a, b, op) => {
    switch (op) {
      case '+': return a + b;
      case '-': return a - b;
      case '*': return a * b;
      case '/': return b === 0 ? Infinity : a / b;
    }
  };

  // Left-to-right evaluation (matches classic tape-calc behavior).
  const evaluateTokens = (tokens) => {
    if (tokens.length === 0) return 0;
    let result = parseFloat(tokens[0]);
    for (let i = 1; i < tokens.length - 1; i += 2) {
      result = calculate(result, parseFloat(tokens[i + 1]), tokens[i]);
      if (!isFinite(result)) return result;
    }
    return result;
  };

  // Helper: write operator sign + number into a .tape-operand element
  const setOperand = (el, op, numText, extraClass = '') => {
    el.textContent = '';
    const opName = op ? OP_NAME[op] : null;
    el.className = 'tape-operand' + (opName ? ' op-' + opName : '') + (extraClass ? ' ' + extraClass : '');
    if (op) {
      const s = document.createElement('span');
      s.className = 'tape-sign';
      s.textContent = OP_SYMBOL[op];
      el.appendChild(s);
    }
    el.appendChild(document.createTextNode(numText));
  };

  // ---------- Note (label) factory ----------
  const makeNote = () => {
    const note = document.createElement('div');
    note.className = 'tape-note';
    note.contentEditable = 'true';
    note.spellcheck = false;
    note.setAttribute('data-placeholder', '+');
    note.setAttribute('role', 'textbox');
    note.setAttribute('aria-label', 'Note');

    note.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === 'Escape') {
        e.preventDefault();
        note.blur();
      }
    });
    note.addEventListener('paste', (e) => {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData)
        .getData('text').replace(/\s+/g, ' ').trim();
      document.execCommand('insertText', false, text);
    });
    note.addEventListener('blur', () => {
      note.textContent = note.textContent.trim();
      saveTape();
    });
    note.addEventListener('input', () => saveTape());
    return note;
  };

  // ---------- Row factory: delete button ----------
  const makeDeleteButton = (row) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'tape-delete';
    btn.setAttribute('aria-label', 'Delete row');
    btn.textContent = '×';
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (row.classList.contains('pending')) return;
      rowAwaitingDelete = row;
      if (typeof $confirmDialog.showModal === 'function') {
        $confirmDialog.showModal();
      } else if (confirm('Delete this row?')) {
        executeRowDelete();
      }
    });
    return btn;
  };

  const executeRowDelete = () => {
    if (!rowAwaitingDelete) return;
    const row = rowAwaitingDelete;
    rowAwaitingDelete = null;
    row.classList.add('removing');
    setTimeout(() => {
      row.remove();
      recomputeRunningTotals();
      saveTape();
    }, 220);
  };

  const recomputeRunningTotals = () => {
    $tape.querySelectorAll('.tape-row:not(.pending)').forEach(row => {
      const r = parseFloat(row.dataset.result);
      if (!isNaN(r)) {
        row.dataset.running = formatNumber(r);
        if (r < 0) row.dataset.runningNeg = '1';
        else delete row.dataset.runningNeg;
      }
    });
  };

  // ---------- localStorage persistence ----------
  const STORAGE_KEY = 'tapecalc-v1';

  const saveTape = () => {
    try {
      const rows = [...$tape.querySelectorAll('.tape-row:not(.pending)')].map(row => ({
        tokens: (() => { try { return JSON.parse(row.dataset.tokens || '[]'); } catch(e) { return []; } })(),
        result: parseFloat(row.dataset.result),
        note: row.querySelector('.tape-note')?.textContent?.trim() || ''
      }));
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        rows,
        lastResult: state.lastResult
      }));
    } catch(e) {}
  };

  const createFinalizedRow = (tokens, result, note) => {
    const empty = document.getElementById('tapeEmpty');
    if (empty) empty.remove();
    const row = document.createElement('div');
    row.className = 'tape-row';
    row.dataset.tokens = JSON.stringify(tokens);
    row.dataset.result = String(result);
    const operand = document.createElement('span');
    operand.className = 'tape-operand';
    if (tokens.length >= 3) {
      setOperand(operand, tokens[1], formatLive(tokens[2]));
    } else {
      setOperand(operand, null, formatLive(tokens[0]), result < 0 ? 'negative' : '');
    }
    const noteEl = makeNote();
    if (note) noteEl.textContent = note;
    const del = makeDeleteButton(row);
    row.appendChild(operand);
    row.appendChild(noteEl);
    row.appendChild(del);
    $tape.appendChild(row);
  };

  const loadTape = () => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const { rows, lastResult } = JSON.parse(raw);
      if (Array.isArray(rows) && rows.length > 0) {
        rows.forEach(({ tokens, result, note }) => {
          if (!Array.isArray(tokens) || !isFinite(result)) return;
          createFinalizedRow(tokens, result, note || '');
        });
        recomputeRunningTotals();
      }
      if (lastResult != null && isFinite(lastResult)) state.lastResult = lastResult;
    } catch(e) {}
  };

  // ---------- Pending row management ----------
  const createPendingRow = () => {
    const empty = document.getElementById('tapeEmpty');
    if (empty) empty.remove();

    const row = document.createElement('div');
    row.className = 'tape-row pending';

    const operand = document.createElement('span');
    operand.className = 'tape-operand';

    const note = makeNote();
    const del = makeDeleteButton(row);

    row.appendChild(operand);
    row.appendChild(note);
    row.appendChild(del);
    $tape.appendChild(row);

    pendingRow = row;
    requestAnimationFrame(() => { $tape.scrollTop = $tape.scrollHeight; });
  };

  const finalizePending = (tokens, result) => {
    if (!pendingRow) return;
    pendingRow.classList.remove('pending');
    pendingRow.dataset.tokens = JSON.stringify(tokens);
    pendingRow.dataset.result = String(result);
    const operand = pendingRow.querySelector('.tape-operand');
    if (tokens.length >= 3) {
      setOperand(operand, tokens[1], formatLive(tokens[2]));
    } else {
      setOperand(operand, null, formatLive(tokens[0]), result < 0 ? 'negative' : '');
    }
    pendingRow = null;
    recomputeRunningTotals();
  };

  const finalizePendingError = (tokens) => {
    if (!pendingRow) return;
    pendingRow.classList.remove('pending');
    pendingRow.dataset.tokens = JSON.stringify(tokens);
    const operand = pendingRow.querySelector('.tape-operand');
    operand.textContent = 'Err';
    operand.className = 'tape-operand error';
    pendingRow = null;
    recomputeRunningTotals();
  };

  // Re-evaluate a finalized row from its dataset.tokens and refresh result UI.
  const refreshRow = (row) => {
    let tokens;
    try { tokens = JSON.parse(row.dataset.tokens || '[]'); } catch (e) { tokens = []; }
    const operand = row.querySelector('.tape-operand');
    if (!operand) return;
    if (tokens.length === 0 || tokens.length === 2) {
      setOperand(operand, null, 'Err', 'error');
      delete row.dataset.result; return;
    }
    const r = evaluateTokens(tokens);
    if (!isFinite(r)) {
      setOperand(operand, null, 'Err', 'error');
      delete row.dataset.result;
    } else {
      row.dataset.result = String(r);
      if (tokens.length >= 3) {
        setOperand(operand, tokens[1], formatLive(tokens[2]));
      } else {
        setOperand(operand, null, formatLive(tokens[0]), r < 0 ? 'negative' : '');
      }
    }
  };

  // Re-render every finalized row's expression and result using current state
  const reRenderAllRows = () => {
    $tape.querySelectorAll('.tape-row:not(.pending)').forEach(row => refreshRow(row));
    recomputeRunningTotals();
    render();
  };

  // ---------- Render ----------
  const render = () => {
    if (!pendingRow) createPendingRow();
    const operand = pendingRow.querySelector('.tape-operand');

    const lastTok = state.tokens[state.tokens.length - 1];
    const pendingOp = (lastTok !== undefined && isOp(lastTok)) ? lastTok : null;
    const firstNum = state.tokens.length > 0 && !isOp(state.tokens[0]) ? state.tokens[0] : null;

    if (state.typing !== null) {
      setOperand(operand, pendingOp, formatLive(state.typing));
    } else if (pendingOp) {
      setOperand(operand, pendingOp, '');
    } else if (firstNum) {
      setOperand(operand, null, formatLive(firstNum));
    } else {
      setOperand(operand, null, '');
    }

    const activeOp = (state.typing === null && pendingOp) ? pendingOp : null;
    document.querySelectorAll('.key.op').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.op === activeOp);
    });
  };

  // ---------- Actions ----------
  const startFreshIfAfterResult = () => {
    // After "=" the next digit starts a brand-new calc; the next operator
    // chains from the previous result.
    if (state.lastResult !== null && state.tokens.length === 0 && state.typing === null) {
      state.lastResult = null;
    }
  };

  const inputDigit = (d) => {
    if (state.error) { state.error = false; state.typing = null; }
    // After '=' the next digit must be preceded by an operator; block until then.
    if (state.lastResult !== null && state.tokens.length === 0 && state.typing === null) return;
    startFreshIfAfterResult();

    if (state.typing === null || state.typing === '0') {
      state.typing = d;
    } else if (state.typing === '-0') {
      state.typing = '-' + d;
    } else {
      state.typing = state.typing + d;
    }
    const digits = state.typing.replace(/[-.]/g, '');
    if (digits.length > 15) {
      state.typing = state.typing.slice(0, -1);
    }
    render();
  };

  const handleOperator = (op) => {
    if (state.error) return;

    // Chain from the last result: feed it into `typing` so the regular branch
    // below handles pushing it to tokens together with the new operator.
    if (state.lastResult !== null && state.tokens.length === 0 && state.typing === null) {
      state.typing = String(state.lastResult);
      state.lastResult = null;
    }

    if (state.typing !== null && state.typing !== '-') {
      // One operator per row: block if first_num + op already committed
      if (state.tokens.length >= 2) return;
      state.tokens.push(state.typing);
      state.tokens.push(op);
      state.typing = null;
    } else if (state.tokens.length > 0 && isOp(state.tokens[state.tokens.length - 1])) {
      // Swap the trailing operator
      state.tokens[state.tokens.length - 1] = op;
    } else if (state.tokens.length === 0 && state.typing === null && op === '-') {
      // Allow a leading minus to start a negative number
      state.typing = '-';
    }
    render();
  };

  const handleEquals = () => {
    if (state.error) return;

    const finalTokens = [...state.tokens];
    if (state.typing !== null && state.typing !== '-') {
      finalTokens.push(state.typing);
    } else if (finalTokens.length > 0 && isOp(finalTokens[finalTokens.length - 1])) {
      finalTokens.pop();
    }

    // A single bare number "150 =" is only allowed as the very first row
    // of the tape. Once any row exists, an operator is required.
    if (finalTokens.length === 0 || finalTokens.length === 2) return;
    if (finalTokens.length === 1) {
      const hasFinalized = $tape.querySelector('.tape-row:not(.pending)') !== null;
      if (hasFinalized) return;
    }

    const result = Math.round(evaluateTokens(finalTokens));

    if (!isFinite(result)) {
      // Finalize the offending row as an error entry, then spawn a fresh pending row.
      finalizePendingError(finalTokens);
      state.tokens = [];
      state.typing = null;
      state.lastResult = null;
      state.error = false;
      createPendingRow();
      render();
      saveTape();
      return;
    }

    finalizePending(finalTokens, result);

    state.tokens = [];
    state.typing = null;
    state.lastResult = result;
    state.error = false;

    createPendingRow();
    render();
    saveTape();
  };

  const backspace = () => {
    if (state.error) { state.error = false; state.typing = null; render(); return; }

    if (state.typing !== null && state.typing.length > 1) {
      state.typing = state.typing.slice(0, -1);
      if (state.typing === '-') state.typing = null;
    } else if (state.typing !== null) {
      state.typing = null;
    } else if (state.tokens.length > 0) {
      const last = state.tokens[state.tokens.length - 1];
      if (isOp(last)) {
        state.tokens.pop();
        // Recover the preceding number into typing so it can be continued.
        if (state.tokens.length > 0) {
          state.typing = state.tokens.pop();
        }
      }
    }
    render();
  };

  const clearEntry = () => {
    state.error = false;
    state.typing = null;
    render();
  };

  const resetAll = () => {
    state.tokens = [];
    state.typing = null;
    state.error = false;
    state.lastResult = null;
    $tape.innerHTML = '';
    pendingRow = null;
    createPendingRow();
    render();
    saveTape();
  };

  // ---------- Event wiring: clicks ----------
  document.querySelectorAll('.key').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.classList.contains('disabled')) return;
      const { digit, op, action } = btn.dataset;
      if (digit !== undefined) inputDigit(digit);
      else if (op !== undefined) handleOperator(op);
      else if (action === 'double-zero') { inputDigit('0'); inputDigit('0'); }
      else if (action === 'equals') handleEquals();
      else if (action === 'backspace') backspace();
      else if (action === 'clear') clearEntry();
      else if (action === 'all-clear') resetAll();
    });
  });

  // ---------- Delete confirmation dialog ----------
  $confirmCancel.addEventListener('click', () => {
    rowAwaitingDelete = null;
    $confirmDialog.close('cancel');
  });
  $confirmDialog.addEventListener('close', () => {
    if ($confirmDialog.returnValue === 'confirm') {
      executeRowDelete();
    } else {
      rowAwaitingDelete = null;
    }
  });

  // ---------- Event wiring: keyboard ----------
  window.addEventListener('keydown', (e) => {
    // Don't hijack keys while editing a note
    const target = e.target;
    if (target && (target.isContentEditable ||
        target.tagName === 'INPUT' || target.tagName === 'TEXTAREA')) {
      return;
    }

    const k = e.key;
    if (/^[0-9]$/.test(k)) { inputDigit(k); e.preventDefault(); return; }
    if (k === '+' || k === '-' || k === '*' || k === '/') {
      handleOperator(k); e.preventDefault(); return;
    }
    if (k === 'Enter' || k === '=') { handleEquals(); e.preventDefault(); return; }
    if (k === 'Backspace') { backspace(); e.preventDefault(); return; }
    if (k === 'Escape') {
      if (state.typing !== null || state.tokens.length > 0 || state.error) clearEntry();
      else resetAll();
      e.preventDefault();
      return;
    }
    if (k === 'Delete') { resetAll(); e.preventDefault(); return; }
  });

  // ---------- Calc handle toggle ----------
  document.getElementById('calcHandle')?.addEventListener('click', () => {
    document.querySelector('.app').classList.toggle('calc-collapsed');
  });

  // Initial paint — restore saved tape, then create the live pending row.
  loadTape();
  createPendingRow();
  render();
})();
</script>
</body>
</html>
